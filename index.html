<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Etch-a-Sketch</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div id="etch-a-sketch-container">
      <div class="toy-surface">
        <div class="logo-container">
          <h1 class="logo magic-screen-logo">MAGIC</h1>
          <h1 class="logo etch-a-sketch-logo">Etch-a-Sketch</h1>
          <h1 class="logo magic-screen-logo">SCREEN</h1>
        </div>

        <!-- PIXEL GRID GENERATION -->
        <div class="drawing-screen"></div>

        <div id="toy-control-panel-container">
          <!-- LEFT-ALIGN -->
          <div id="set-resolution-container">
            <form class="control-form">
              <button
                type="button"
                class="btn-set-resolution btn-knob"
              ></button>

              <div id="input-label-container">
                <label for="screen-controls">Pixel size</label>
                <input id="screen-controls" class="custom-screen-resolution" />
              </div>
            </form>
          </div>

          <!-- MIDDLE-ALIGN -->
          <div id="shake-toy-container">
            <form class="control-form">
              <button type="button" class="btn-shake-toy"></button>
              <p class="shake-toy-text">shake!</p>
            </form>
          </div>

          <!-- RIGHT-ALIGN -->
          <div id="multicolor-toggle-container">
            <form class="control-form">
              <button
                type="button"
                class="btn-multicolor-toggle btn-knob"
              ></button>
              <p class="multicolor-status-text">Multicolor</p>
            </form>
          </div>
        </div>
        <!-- end of toy-control-panel-container div -->
      </div>
      <!-- end of toy-surface div -->
    </div>
    <!-- end of etch-a-sketch-container div -->
  </body>
</html>
