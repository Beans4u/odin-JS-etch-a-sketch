<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Etch-a-Sketch</title>
  </head>
  <body>
    <div id="toy-surface">
      <h1 id="logo">Etch-a-Sketch</h1>

      <div id="drawing-screen"></div>

      <div id="custom-resolution-buttons">
        <form>
          <button id="btn-set-resolution"></button>
          <input id="custom-screen-resolution" />
          <label>Enter a custom screen resolution</label>

          <button id="btn-multicolor-toggle"></button>
          <label>Toggle Multicolor</label>
        </form>
      </div>
    </div>

    <div id="shake-toy-container">
      <button id="btn-shake-toy"></button>
      <p id="shake-toy-text">shake! (erase your image)</p>
    </div>
  </body>
</html>
