<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Etch-a-Sketch</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="etch-a-sketch-container">
      <div class="toy-surface">
        <h1 class="logo magic-screen-logo">MAGIC</h1>
        <h1 class="logo etch-a-sketch-logo">Etch-a-Sketch</h1>
        <h1 class="logo magic-screen-logo">SCREEN</h1>

        <div class="drawing-screen"></div>

        <div id="toy-control-panel">
          <form>
            <button class="btn-set-resolution"></button>
            <input
              id="screen-controls"
              class="custom-screen-resolution"
            />
            <label for="screen-controls"
              >Enter a custom screen resolution</label
            >

            <button class="btn-shake-toy"></button>
            <p class="shake-toy-text">shake! (erase your image)</p>

            <button class="btn-multicolor-toggle"></button>
            <p class="multicolor-status-label">Toggle Multicolor</p>
          </form>
        </div>
      </div>
      </div>
    </div>
  </body>
</html>
